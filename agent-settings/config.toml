model = "gpt-5.4"
model_reasoning_effort = "xhigh"
service_tier = "fast"
approval_policy = "never"               # Dont ask for permission
sandbox_mode    = "danger-full-access"  # full access computer-wide

[windows]
sandbox = "unelevated" 

[shell_environment_policy]
inherit = "all"

[features]
multi_agent = true

# ── MCP ───────────────────────────────────────────────────────────────────────
[mcp_servers.openaiDeveloperDocs]
url = "https://developers.openai.com/mcp"

[mcp_servers.playwright]
command = "npx"
args = ["@playwright/mcp@latest"]

[mcp_servers.github]
url = "https://api.githubcopilot.com/mcp/"
bearer_token_env_var = "GITHUB_PAT_TOKEN"

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp"]

# ── Disable Data Collection ───────────────────────────────────────────────────
[analytics]
enabled = false

[feedback]
enabled = false

[otel]                       # OpenTelemetry
exporter         = "none"    # disable log export
metrics_exporter = "none"    # disable metrics (sends data by default!)
trace_exporter   = "none"    # disable trace export
log_user_prompt  = false     # never include prompt text in logs
